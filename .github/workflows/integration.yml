name: Integration
on:
  pull_request:
    branches: [ main ]
    paths:
      - '**.api'
      - '**.kt'
      - '**.kts'
      - .github/workflows/integration.yml
      - gradle/**
      - gradle.properties
      - gradlew
      - gradlew.bat
      - yarn.lock
  push:
    branches: [ main ]
    paths:
      - '**.api'
      - '**.kt'
      - '**.kts'
      - .github/workflows/integration.yml
      - gradle/**
      - gradle.properties
      - gradlew
      - gradlew.bat
      - yarn.lock
  workflow_dispatch:
jobs:
  build:
    name: Build projects
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v5.0.1
      - name: Setup Java
        uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: 17
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5.0.2
      - name: Build 'plugins' project
        run: ./gradlew :plugins:build
      - name: Build 'types-internal' project
        run: ./gradlew :types-internal:build
      - name: Build 'types' project
        run: ./gradlew :types:build
      - name: Build 'types-kotlinx-serialization' project
        run: ./gradlew :types-kotlinx-serialization:build
